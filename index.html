<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Plangine Tech - 14 Scenes Exhibition</title>
    <!-- 核心库 -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/smiley-sans@1.1.1/font/SmileySans-Oblique.css">
    
    <style>
        :root {
            --bg-color: #000;
            --accent-color: #0071e3;
            --text-main: #f5f5f7;
            --text-dim: #86868b;
            --glass-bg: rgba(30, 30, 30, 0.6);
            --glass-border: rgba(255, 255, 255, 0.1);
            --font-main: "Smiley Sans", "SF Pro Display", "PingFang SC", sans-serif;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: var(--bg-color);
            font-family: var(--font-main);
            color: var(--text-main);
            overflow: hidden; /* 使用虚拟滚动，隐藏原生滚动条 */
            -webkit-font-smoothing: antialiased;
        }

        /* 极简上传层 */
        #upload-container {
            position: fixed;
            inset: 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            background: #000;
            transition: transform 1.2s cubic-bezier(0.65, 0, 0.35, 1), opacity 0.8s;
        }

        .upload-card {
            padding: 60px;
            border-radius: 40px;
            text-align: center;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--glass-border);
            backdrop-filter: blur(20px);
        }

        .btn-apple {
            background: var(--accent-color);
            color: white;
            padding: 16px 32px;
            border-radius: 980px;
            font-size: 17px;
            font-weight: 500;
            cursor: pointer;
            border: none;
            transition: all 0.3s;
        }

        .btn-apple:hover { 
            transform: scale(1.05);
            background: #0077ed;
        }

        /* 画布容器 */
        #scroll-wrapper {
            display: none;
            opacity: 0;
            transition: opacity 1.5s ease;
            width: 100%;
            height: 100%;
            position: relative;
        }

        .canvas-viewport {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1;
            background: #000;
            overflow: hidden;
        }

        /* 氛围背景层 */
        #bg-canvas {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            filter: blur(60px) brightness(0.7);
            transform: scale(1.1); /* 消除边缘白边 */
            opacity: 0.7;
            z-index: 1;
        }

        /* 主展板层 */
        #main-canvas {
            position: relative;
            z-index: 2;
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        /* 场景指示器 (DOTS) */
        .scene-nav {
            position: fixed;
            right: 40px;
            top: 50%;
            transform: translateY(-50%);
            z-index: 100;
            display: flex;
            flex-direction: column;
            gap: 20px;
            align-items: flex-end;
        }

        .scene-dot {
            width: 6px;
            height: 6px;
            background: #333;
            border-radius: 50%;
            transition: all 0.4s;
            position: relative;
            cursor: pointer;
        }

        .scene-dot:hover {
            transform: scale(1.5);
            background: #666;
        }

        .scene-dot.active {
            background: var(--accent-color);
            transform: scale(1.8);
        }

        .scene-label {
            position: absolute;
            right: 20px;
            top: -5px;
            font-size: 12px;
            opacity: 0;
            white-space: nowrap;
            color: var(--text-dim);
            transition: 0.3s;
            letter-spacing: 1px;
            font-weight: 500;
        }

        .scene-dot.active .scene-label, .scene-dot:hover .scene-label {
            opacity: 1;
            transform: translateX(-5px);
        }
        .scene-dot.active .scene-label {
            color: var(--accent-color);
        }

        /* 底部 HUD */
        .hud {
            position: fixed;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 100;
            background: var(--glass-bg);
            backdrop-filter: blur(25px);
            padding: 12px 30px;
            border-radius: 100px;
            border: 1px solid var(--glass-border);
            font-size: 14px;
            letter-spacing: 1.5px;
            display: flex;
            align-items: center;
            gap: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .hud span { color: var(--accent-color); font-weight: 600; }
        .hud-title { color: white; font-weight: 500; font-size: 15px; }

        /* 全局加载条 */
        .progress-container {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 3px;
            background: #111;
            z-index: 9999;
            pointer-events: none;
            opacity: 0;
            transition: opacity 1s;
        }
        .progress-bar {
            height: 100%;
            background: var(--accent-color);
            width: 0%;
            transform-origin: left;
        }

        #loading-overlay {
            position: absolute;
            bottom: 40px;
            width: 250px;
            height: 2px;
            background: #222;
        }
        #loading-bar {
            height: 100%;
            background: var(--accent-color);
            width: 0%;
            transition: width 0.3s;
        }

        /* 查看展板按钮 */
        #board-btn {
            position: fixed;
            bottom: 40px;
            right: 40px;
            z-index: 100;
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            padding: 15px 25px;
            border-radius: 20px;
            color: white;
            font-size: 15px;
            font-weight: 500;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 10px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            opacity: 0;
            pointer-events: none;
            transform: translateY(20px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }
        #board-btn.visible {
            opacity: 1;
            pointer-events: auto;
            transform: translateY(0);
        }
        #board-btn:hover {
            background: rgba(50, 50, 50, 0.8);
            transform: translateY(-2px);
        }

        /* 滑动引导 */
        #scroll-hint {
            position: fixed;
            bottom: 110px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 100;
            text-align: center;
            color: rgba(0, 0, 0, 0.9); /* 改为黑色 */
            font-size: 15px;
            letter-spacing: 2px;
            transition: all 0.8s ease;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            text-shadow: 0 0 5px rgba(255,255,255,0.4); /* 增加微妙的亮边防止在极黑背景消失 */
        }
        
        #scroll-hint svg {
            width: 20px;
            height: 20px;
            animation: bobbing 2s ease-in-out infinite;
        }

        @keyframes bobbing {
            0%, 100% { transform: translateY(0); opacity: 0.4; }
            50% { transform: translateY(10px); opacity: 1; }
        }

        /* ====== 中心交互区 ====== */
        .portal-container {
            position: fixed;
            inset: 0; /* 全屏覆盖以支持绝对定位 */
            z-index: 95;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.8s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .portal-container.visible {
            opacity: 1;
            pointer-events: auto;
        }

        .portal-dot-item {
            position: absolute; /* 切换为绝对定位 */
            transform: translate(-50%, -50%);
            cursor: pointer;
            display: flex;
            flex-direction: column;
            align-items: center;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .portal-dot-item:hover {
            transform: translate(-50%, -60%); /* hover 时向上悬浮更多一点点 */
        }

        .portal-arrow-core {
            width: 38px;
            height: 42px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            display: flex;
            justify-content: center;
            align-items: center;
            border-radius: 10px;
            border: 1px solid rgba(255,255,255,0.1);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            color: white;
            position: relative;
            overflow: visible;
        }

        .portal-arrow-core svg {
            width: 32px;
            height: 32px;
            filter: drop-shadow(0 0 5px rgba(0,0,0,0.5));
            transition: transform 0.3s ease;
        }

        /* 呼吸光环 */
        .portal-arrow-glow {
            position: absolute;
            inset: -4px;
            border-radius: 12px;
            background: var(--accent-color);
            opacity: 0.3;
            filter: blur(8px);
            z-index: -1;
            animation: arrowGlow 2s infinite ease-in-out;
        }

        @keyframes arrowGlow {
            0%, 100% { opacity: 0.2; transform: scale(1); }
            50% { opacity: 0.5; transform: scale(1.15); }
        }

        .portal-dot-item:hover .portal-arrow-core {
            background: #0077ed;
            box-shadow: 0 12px 30px rgba(0, 113, 227, 0.7);
        }

        .portal-dot-item:hover .portal-arrow-core svg {
            transform: translateY(-4px); /* 向上滑动感 */
        }

        .portal-label {
            display: none; /* 去掉展板文字 */
        }

        .portal-dot-item:hover .portal-label {
            opacity: 1;
            background: var(--accent-color);
        }

        /* ====== Lightbox 全屏查看器 ====== */
        #lightbox {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.9);
            backdrop-filter: blur(30px);
            z-index: 2000;
            display: flex;
            justify-content: center;
            align-items: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.4s ease;
        }
        #lightbox.open {
            opacity: 1;
            pointer-events: auto;
        }
        
        #lightbox-img-container {
            width: 90vw;
            height: 90vh;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            overflow: hidden; /* 拖拽边界隐藏 */
        }

        #lightbox-img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
            cursor: grab;
            transition: transform 0.1s; /* smooth panning */
            transform-origin: center center;
            box-shadow: 0 20px 60px rgba(0,0,0,0.5);
            border-radius: 10px;
            user-select: none;
            -webkit-user-drag: none;
            pointer-events: none; /* 让鼠标事件穿透到上层遮罩 */
        }
        #lightbox-img:active { cursor: grabbing; }

        /* 保护遮罩层 */
        #lb-protective-overlay {
            position: absolute;
            inset: 0;
            z-index: 10;
            cursor: grab;
            touch-action: none; /* 禁用 Edge/移动端的原生缩放 */
        }
        #lb-protective-overlay:active { cursor: grabbing; }

        .lb-close {
            position: absolute;
            top: 30px;
            right: 40px;
            font-size: 40px;
            color: white;
            cursor: pointer;
            opacity: 0.6;
            transition: 0.3s;
            z-index: 2001;
        }
        .lb-close:hover { opacity: 1; }

        .lb-nav {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            font-size: 50px;
            color: white;
            cursor: pointer;
            opacity: 0.5;
            transition: 0.3s;
            padding: 20px;
            z-index: 2001;
            background: rgba(0,0,0,0.2);
            border-radius: 50%;
        }
        .lb-nav:hover { opacity: 1; background: rgba(0,0,0,0.6); }
        .lb-prev { left: 40px; }
        .lb-next { right: 40px; }

        .lb-indicator {
            position: absolute;
            bottom: 30px;
            color: var(--text-dim);
            font-size: 16px;
            letter-spacing: 2px;
        }
        
        .lb-loader {
            position: absolute;
            border: 3px solid rgba(255,255,255,0.1);
            border-top: 3px solid var(--accent-color);
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            display: none;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* ====== 留言板 (场景13) ====== */
        #guestbook-panel {
            position: fixed;
            top: 40px;
            left: 50%;
            transform: translateX(-50%) translateY(-20px);
            width: 800px;
            max-width: 90vw;
            height: 70vh;
            background: var(--glass-bg);
            backdrop-filter: blur(25px);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
            z-index: 90;
            display: flex;
            flex-direction: column;
            padding: 30px;
            opacity: 0;
            pointer-events: none;
            transition: all 0.5s cubic-bezier(0.16, 1, 0.3, 1);
        }
        #guestbook-panel.visible {
            opacity: 1;
            pointer-events: auto;
            transform: translateX(-50%) translateY(0);
        }
        .gb-header {
            font-size: 24px;
            font-weight: 500;
            margin-bottom: 20px;
            text-align: center;
        }
        .gb-list {
            flex: 1;
            overflow-y: auto;
            margin-bottom: 20px;
            padding-right: 10px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        .gb-list::-webkit-scrollbar { width: 6px; }
        .gb-list::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 10px; }
        .gb-item {
            background: rgba(255,255,255,0.05);
            padding: 15px 20px;
            border-radius: 12px;
            border-left: 3px solid var(--accent-color);
        }
        .gb-item strong { display: block; color: #fff; margin-bottom: 5px; font-size: 14px;}
        .gb-item p { margin: 0; font-size: 16px; line-height: 1.5; color: #ddd; }
        .gb-item span { font-size: 11px; color: #666; float: right; }

        .gb-form {
            display: flex;
            gap: 15px;
            background: rgba(0,0,0,0.3);
            padding: 15px;
            border-radius: 15px;
        }
        .gb-form input {
            background: transparent;
            border: 1px solid rgba(255,255,255,0.2);
            color: white;
            padding: 12px 15px;
            border-radius: 8px;
            font-size: 15px;
            outline: none;
            transition: 0.3s;
        }
        .gb-form input:focus { border-color: var(--accent-color); }
        .gb-form input[type="text"] { flex: 1; }
        .gb-form input.name-input { width: 120px; }
        .gb-btn {
            background: var(--accent-color);
            color: white;
            border: none;
            padding: 0 25px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            transition: 0.3s;
        }
        .gb-btn:hover { background: #0088ff; }
        
        .gb-close {
            position: absolute;
            top: 20px;
            right: 25px;
            font-size: 28px;
            color: var(--text-dim);
            cursor: pointer;
            transition: 0.3s;
            line-height: 1;
            z-index: 10;
        }
        .gb-close:hover { color: white; transform: scale(1.1); }

        /* ====== 手机端适配 ====== */
        #landscape-lock-hint {
            position: fixed;
            inset: 0;
            background: #000;
            z-index: 99999;
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            color: #fff;
            backdrop-filter: blur(10px);
        }

        @media (orientation: portrait) and (max-width: 1024px) {
            #landscape-lock-hint { display: flex; }
        }

        .phone-rotate-icon {
            width: 80px;
            height: 80px;
            margin-bottom: 30px;
            animation: phoneRotate 2s ease-in-out infinite;
        }
        @keyframes phoneRotate {
            0% { transform: rotate(0deg); }
            30% { transform: rotate(-90deg); }
            70% { transform: rotate(-90deg); }
            100% { transform: rotate(0deg); }
        }

        .lock-hint-content h2 { font-weight: 500; letter-spacing: 2px; margin-bottom: 10px; }
        .lock-hint-content p { color: #888; font-size: 14px; }

        @media screen and (max-height: 500px) and (orientation: landscape) {
            .hud { bottom: 20px; padding: 8px 20px; font-size: 12px; }
            .hud-title { font-size: 13px; }
            #board-btn { bottom: 20px; right: 20px; padding: 10px 18px; font-size: 13px; }
            .scene-nav { right: 20px; gap: 12px; }
            .scene-dot { width: 5px; height: 5px; }
            #scroll-hint { bottom: 80px; font-size: 13px; }
            #guestbook-panel { top: 20px; height: 85vh; padding: 15px; }
            .gb-header { font-size: 20px; margin-bottom: 10px; }
            .gb-form { padding: 8px; }
            .upload-card { padding: 30px; border-radius: 20px; }
            .upload-card h1 { font-size: 32px; }
        }

    </style>
</head>
<body>

    <div id="upload-container">
        <div class="upload-card">
            <h1 style="font-size: 42px; margin-bottom: 5px; letter-spacing: -1px;">建筑的智慧视界</h1>
            <p style="margin-bottom: 40px; font-weight: 300; color: #888;">2026 建筑 × AI 科普展 · 线上全景模拟</p>
            <button id="embedded-load-btn" class="btn-apple">开始沉浸式看展</button>
            <div id="loading-overlay"><div id="loading-bar"></div></div>
        </div>
    </div>

    <!-- 顶部进度条 -->
    <div class="progress-container" id="scroll-progress-wrapper">
        <div class="progress-bar" id="scroll-progress-bar"></div>
    </div>

    <video id="sequence-video" playsinline muted preload="auto" style="display: none;"></video>
    <div id="scroll-wrapper">
        <div class="canvas-viewport">
            <canvas id="bg-canvas"></canvas>
            <canvas id="main-canvas"></canvas>
        </div>
        
        <nav class="scene-nav" id="scene-nav"></nav>
        
        <div class="hud">
            SCENE <span id="hud-scene">01</span> / 15 
            <div style="width: 1px; height: 12px; background: #666;"></div>
            <div class="hud-title" id="hud-title">鸟瞰全景</div>
        </div>

        <div id="scroll-hint">
            <span>开始滑动开启微缩旅程</span>
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M7 13l5 5 5-5M7 6l5 5 5-5" />
            </svg>
        </div>

        <button id="board-btn">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><circle cx="8.5" cy="8.5" r="1.5"></circle><polyline points="21 15 16 10 5 21"></polyline></svg>
            查看高清展板
        </button>

        <!-- 中心交互蓝点容器 -->
        <div id="portal-container" class="portal-container">
            <!-- JS 动态填充点位 -->
        </div>
    </div>

    <!-- 留言板 -->
    <div id="guestbook-panel">
        <div class="gb-close" onclick="closeGuestbook()">×</div>
        <div class="gb-header">观展留言</div>
        <div class="gb-list" id="gb-list">
            <!-- 留言列表将动态生成 -->
        </div>
        <form class="gb-form" id="gb-form" onsubmit="submitGuestbook(event)">
            <input type="text" class="name-input" id="gb-name" placeholder="您的昵称" required maxlength="10">
            <input type="text" id="gb-content" placeholder="写下您对本次展览的感想..." required>
            <button type="submit" class="gb-btn">留 言</button>
        </form>
    </div>

    <!-- 锁定横屏提示层 -->
    <div id="landscape-lock-hint">
        <div class="lock-hint-content">
            <div class="phone-rotate-icon">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                    <path d="M1 12.5C1 12.5 1 5.5 8 5.5H16C23 5.5 23 12.5 23 12.5V13.5C23 13.5 23 20.5 16 20.5H8C1 20.5 1 13.5 1 13.5V12.5Z" stroke-linecap="round" stroke-linejoin="round"/>
                    <path d="M12 2V4" stroke-linecap="round" stroke-linejoin="round"/>
                    <path d="M12 20V22" stroke-linecap="round" stroke-linejoin="round"/>
                    <rect x="11" y="8" width="2" height="8" rx="1" fill="currentColor" opacity="0.3"/>
                </svg>
            </div>
            <h2>请横屏开启沉浸之旅</h2>
            <p>为了获得最佳观展效果，建议锁定手机横屏方向</p>
        </div>
    </div>

    <!-- Lightbox -->
    <div id="lightbox">
        <div class="lb-close" onclick="closeLightbox()">×</div>
        <div class="lb-nav lb-prev" onclick="changeLightboxImg(-1)">‹</div>
        <div id="lightbox-img-container">
            <div class="lb-loader" id="lb-loader"></div>
            <img id="lightbox-img" src="" alt="Exhibition Board" draggable="false">
            <div id="lb-protective-overlay"></div>
        </div>
        <div class="lb-nav lb-next" onclick="changeLightboxImg(1)">›</div>
        <div class="lb-indicator"><span id="lb-current">1</span> / <span id="lb-total">3</span></div>
    </div>

    
<script>
    // --- BASE64 DATA ---
    const VIDEO_B64 = "./assets/video_1.mp4";
    const SCENE_IMAGES_B64 = ["./assets/image_1.webp","./assets/image_2.webp","./assets/image_3.webp","./assets/image_4.webp","./assets/image_5.webp","./assets/image_6.webp","./assets/image_7.webp","./assets/image_8.webp","./assets/image_9.webp","./assets/image_10.webp","./assets/image_11.webp","./assets/image_12.webp","./assets/image_13.webp","./assets/image_14.webp","./assets/image_15.webp"];

        // --- 3. 自定义物理滚动与阻尼系统 ---
        function getDampedProgress(p) {
            const segment = 1 / (NUM_SCENES - 1);
            let i = Math.floor(p * (NUM_SCENES - 1));
            if (i >= NUM_SCENES - 1) i = NUM_SCENES - 2;
            let localP = (p - i * segment) / segment;
            
            localP = Math.max(0, Math.min(1, localP));
            // 使用 Sine Easing 替代 Power3，获得更丝滑的进出动态
            const easedLocalP = gsap.parseEase("sine.inOut")(localP);
            return (i + easedLocalP) * segment;
        }

        window.addEventListener('wheel', (e) => {
            if(document.getElementById('lightbox').classList.contains('open')) return;

            isSnapping = false;
            clearTimeout(snapTimer);
            
            const wheelRatio = 0.0015; 
            globalTargetProgress += e.deltaY * wheelRatio;
            globalTargetProgress = Math.max(0, Math.min(NUM_SCENES - 1, globalTargetProgress));
            
            snapTimer = setTimeout(() => {
                isSnapping = true;
                const nearest = Math.round(globalTargetProgress);
                gsap.to(window, {
                    duration: 1.0,
                    globalTargetProgress: nearest,
                    ease: "power2.out"
                });
            }, 250);

        }, {passive: false});

        // --- 3.5 触摸滑动支持 (手机端) ---
        let touchStartX = 0;

            if(document.getElementById('lightbox').classList.contains('open')) return;
            
            const touchEndX = e.changedTouches[0].clientX;
            const touchEndY = e.changedTouches[0].clientY;
            const dx = touchEndX - touchStartX;
            const dy = touchEndY - touchStartY;
            
            const threshold = 50; // 触发阈值
            const isLandscape = window.innerWidth > window.innerHeight;
            
            let moved = false;
            let nearest = Math.round(globalTargetProgress);
            
            if (isLandscape) {
                // 横屏：左右滑动
                if (Math.abs(dx) > threshold && Math.abs(dx) > Math.abs(dy)) {
                    globalTargetProgress = Math.max(0, Math.min(NUM_SCENES - 1, nearest + (dx > 0 ? -1 : 1)));
                    moved = true;
                }
            } else {
                // 竖屏：上下滑动
                if (Math.abs(dy) > threshold && Math.abs(dy) > Math.abs(dx)) {
                    globalTargetProgress = Math.max(0, Math.min(NUM_SCENES - 1, nearest + (dy > 0 ? -1 : 1)));
                    moved = true;
                }
            }

            if (moved) {
                isSnapping = true;
                gsap.to(window, {
                    duration: 0.8,
                    globalTargetProgress: globalTargetProgress,
                    ease: "power2.out"
                });
            }

            if (e.key === 'ArrowDown' || e.key === 'PageDown') {
                globalTargetProgress = Math.min(NUM_SCENES - 1, nearest + 1);
                changed = true;
            } else if (e.key === 'ArrowUp' || e.key === 'PageUp') {
                globalTargetProgress = Math.max(0, nearest - 1);
                changed = true;

            if (changed) {

        // 渲染循环
        function startRenderLoop() {
            let lastDampedP = -1;
            function loop() {
                // 增加阻尼感，系数从 0.12 下调至 0.08 以获得更“丝滑”的视觉连贯感
                globalCurrentProgress += (globalTargetProgress - globalCurrentProgress) * 0.08;

                const progressNorm = globalCurrentProgress / (NUM_SCENES - 1); // 0 to 1
                const dampedP = getDampedProgress(progressNorm);
                
                // 只有当进度发生微小偏移时才重绘，节省性能
                if (Math.abs(dampedP - lastDampedP) > 0.00001) {
                    // --- 核心混合渲染逻辑 (Cross-fade) ---
                    const sceneIdxFloat = dampedP * (NUM_SCENES - 1);
                    const sceneIdx = Math.round(sceneIdxFloat);
                    const distToScene = Math.abs(sceneIdxFloat - sceneIdx);
                    
                    const blendWindow = 0.15; // 混合窗口大小

                    // 1. 先绘制底层动力视频
                    if (seqVideo.duration) {
                        let t = dampedP * seqVideo.duration;
                        t = Math.max(0, Math.min(seqVideo.duration - 0.05, t));
                        if (Math.abs(seqVideo.currentTime - t) > 0.005) {
                            seqVideo.currentTime = t;
                        }
                    }
                    ctx.drawImage(seqVideo, 0, 0, canvas.width, canvas.height);

                    // 2. 如果接近场景吸附点，则叠映高清图
                    if (distToScene < blendWindow && sceneImages[sceneIdx] && sceneImages[sceneIdx].complete) {
                        // 使用平方衰减让中心吸附更稳定
                        const opacity = Math.pow(1 - (distToScene / blendWindow), 2);
                        ctx.globalAlpha = opacity;
                        ctx.drawImage(sceneImages[sceneIdx], 0, 0, canvas.width, canvas.height);
                        ctx.globalAlpha = 1.0;
                    }
                    
                    updateUI(0, dampedP);
                    lastDampedP = dampedP;
                }

                requestAnimationFrame(loop);
            }
            requestAnimationFrame(loop);
        }

        let boardVisibleDelayTimer = null;
        
        function updateUI(frameIdx, dampedP) {

        // 留言板手动关闭逻辑

        // --- 4. Lightbox 展板查看器系统 ---

            resetZoom();

        function resetZoom() {
            scale = 1; panX = 0; panY = 0;

        }
        function updateTransform() {
            lbImg.style.transform = `translate(${panX}px, ${panY}px) scale(${scale})`;
        }

        // 挂载交互事件到保护遮罩层
        const lbOverlay = document.getElementById('lb-protective-overlay');

        // 鼠标拖拽平移
        lbOverlay.addEventListener('mousedown', (e) => {
            if(scale <= 1) return;
            isDragging = true;
            startX = e.clientX - panX;
            startY = e.clientY - panY;
            e.preventDefault();
        });
        window.addEventListener('mousemove', (e) => {
            if (!isDragging) return;
            panX = e.clientX - startX;
            panY = e.clientY - startY;
            updateTransform();
        });
        window.addEventListener('mouseup', () => { isDragging = false; });

        // --- 手机端触摸缩放与平移 ---
        let initialDist = -1;
        let initialScale = 1;

        lbOverlay.addEventListener('touchstart', (e) => {
            if (e.touches.length === 2) {
                initialDist = Math.hypot(
                    e.touches[0].clientX - e.touches[1].clientX,
                    e.touches[0].clientY - e.touches[1].clientY
                );
                initialScale = scale;
            } else if (e.touches.length === 1) {
                if (scale > 1) {
                    isDragging = true;
                    startX = e.touches[0].clientX - panX;
                    startY = e.touches[0].clientY - panY;
                }
            }
        }, { passive: false });

        lbOverlay.addEventListener('touchmove', (e) => {
            if (e.touches.length === 2 && initialDist > 0) {
                e.preventDefault();
                const dist = Math.hypot(
                    e.touches[0].clientX - e.touches[1].clientX,
                    e.touches[0].clientY - e.touches[1].clientY
                );
                const newScale = Math.min(Math.max(1, initialScale * (dist / initialDist)), 4);
                scale = newScale;
                if (scale === 1) { panX = 0; panY = 0; }
                updateTransform();
            } else if (e.touches.length === 1 && isDragging) {
                e.preventDefault();
                panX = e.touches[0].clientX - startX;
                panY = e.touches[0].clientY - startY;
                updateTransform();
            }
        }, { passive: false });

        lbOverlay.addEventListener('touchend', (e) => {
            if (e.touches.length < 2) initialDist = -1;
            isDragging = false;
        });
        
        // 鼠标滚轮缩放图片
        lbOverlay.addEventListener('wheel', (e) => {
            if(!document.getElementById('lightbox').classList.contains('open')) return;
            e.preventDefault();
            const delta = e.deltaY * -0.01;
            const newScale = Math.min(Math.max(1, scale + delta), 4); // 限制 1x ~ 4x
            
            scale = newScale;
            if(scale === 1) { panX = 0; panY = 0; }
            updateTransform();
        }, {passive: false});

        // 双击放大/还原图片
        lbOverlay.addEventListener('dblclick', (e) => {
            if(!document.getElementById('lightbox').classList.contains('open')) return;
            if (scale > 1) {
                scale = 1;
                panX = 0;
                panY = 0;
            } else {
                scale = 2.5;
                panX = 0;
                panY = 0;
            }
            lbImg.style.transition = 'transform 0.3s ease';
            updateTransform();
            
            setTimeout(() => {
                lbImg.style.transition = 'transform 0.1s'; 
            }, 300);
        });


        // --- 5. 留言板逻辑 ---
        const GUESTBOOK_KEY = 'plangine_guestbook';
        function loadGuestbook() {
            const list = document.getElementById('gb-list');
            list.innerHTML = '';
            const data = JSON.parse(localStorage.getItem(GUESTBOOK_KEY) || '[]');
            
            // 提供内置的几条示例留言让画面不为空
            if(data.length === 0) {
                data.push({name: "建筑初学者", content:"非常震撼的模型展示，AI与手绘的结合让我看到了新出路。", time: "1天前"});
                data.push({name: "数字参数师", content:"很喜欢场景10的大幅渲染！材质阻尼感交互也做得很棒。", time: "3小时前"});
            }

            data.forEach(item => {
                const el = document.createElement('div');
                el.className = 'gb-item';
                el.innerHTML = `<span>${item.time}</span><strong>${item.name}</strong><p>${item.content}</p>`;
                list.appendChild(el);
            });
            // 自动滚到底部
            list.scrollTop = list.scrollHeight;
        }

        function submitGuestbook(e) {
            e.preventDefault();
            const name = document.getElementById('gb-name').value.trim();
            const content = document.getElementById('gb-content').value.trim();
            if(!name || !content) return;

            const now = new Date();
            const timeStr = `${now.getMonth()+1}-${now.getDate()} ${now.getHours().toString().padStart(2,'0')}:${now.getMinutes().toString().padStart(2,'0')}`;
            
            const data = JSON.parse(localStorage.getItem(GUESTBOOK_KEY) || '[]');
            // 处理默认数据
            if(data.length > 0 && !data[0].time.includes('-')) {
                // 如果是那两条假的假的时间戳，说明是默认的，保留即可
            }
            
            data.push({ name, content, time: timeStr });
            localStorage.setItem(GUESTBOOK_KEY, JSON.stringify(data));
            
            document.getElementById('gb-content').value = '';
            
            // 重新渲染留言板
            const el = document.createElement('div');
            el.className = 'gb-item';
            el.innerHTML = `<span>${timeStr}</span><strong>${name}</strong><p>${content}</p>`;
            
            const list = document.getElementById('gb-list');
            list.appendChild(el);
            
            // 平滑滚动到底部
            setTimeout(() => {
                list.scrollTo({ top: list.scrollHeight, behavior: 'smooth' });
            }, 100);
            
            // 反馈
            const btn = document.querySelector('.gb-btn');
            const oldText = btn.innerText;
            btn.innerText = "感谢留言!";
            btn.style.background = "#28a745";
            setTimeout(() => {
                btn.innerText = "留 言";
                btn.style.background = "var(--accent-color)";
            }, 2000);
        }
        // --- 6. 基础安全防护 ---
        (function() {
            // 禁用右键
            document.addEventListener('contextmenu', e => e.preventDefault());

            // 禁用 F12, Ctrl+Shift+I/C/J, Ctrl+U
            window.addEventListener('keydown', e => {
                if (
                    e.keyCode === 123 || // F12
                    (e.ctrlKey && e.shiftKey && (e.keyCode === 73 || e.keyCode === 74 || e.keyCode === 67)) || // Ctrl+Shift+I/J/C
                    (e.ctrlKey && e.keyCode === 85) // Ctrl+U
                ) {
                    e.preventDefault();
                    return false;
                }
            });

            // 禁止打开新窗口
            window.open = function() { console.log('Window open blocked'); return null; };
        })();
    </script>
